<!doctype html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        width: 512px;
        height: 512px;
        overflow: hidden;
      }
      svg {
        width: 512px;
        height: 512px;
      }
    </style>
  </head>
  <body>
    <!-- Use the SVG I just wrote -->
    <svg
      width="512"
      height="512"
      viewBox="0 0 512 512"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
    >
      <defs>
        <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#00F2FE" />
          <stop offset="100%" stop-color="#4FACFE" />
        </linearGradient>
        <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#FFFFFF" />
          <stop offset="50%" stop-color="#CBD5E1" />
          <stop offset="100%" stop-color="#94A3B8" />
        </linearGradient>
        <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="12" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
      </defs>
      <path
        d="M256 40 L450 148 V364 L256 472 L62 364 V148 L256 40Z"
        fill="#030712"
        stroke="url(#silverGrad)"
        stroke-width="4"
      />
      <path
        d="M256 60 L430 158 V354 L256 452 L82 354 V158 L256 60Z"
        fill="none"
        stroke="url(#mainGrad)"
        stroke-width="2"
        opacity="0.3"
        filter="url(#neonGlow)"
      />
      <path
        d="M256 40 V100 M62 148 H120 M450 148 H392 M62 364 H120 M450 364 H392 M256 472 V412"
        stroke="url(#mainGrad)"
        stroke-width="2"
        stroke-linecap="round"
        opacity="0.6"
      />
      <g filter="url(#neonGlow)">
        <path
          d="M160 340 V180 L256 280 L352 180 V340"
          stroke="url(#mainGrad)"
          stroke-width="30"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <path
          d="M256 280 V400"
          stroke="white"
          stroke-width="12"
          stroke-linecap="round"
          opacity="0.8"
        />
      </g>
      <circle cx="256" cy="280" r="8" fill="white" />
      <circle cx="160" cy="180" r="10" fill="#00F2FE" />
      <circle cx="352" cy="180" r="10" fill="#00F2FE" />
      <circle cx="160" cy="340" r="10" fill="#4FACFE" />
      <circle cx="352" cy="340" r="10" fill="#4FACFE" />
    </svg>
  </body>
</html>
