<div id="more-modal" class="modal hidden">
  <div class="modal-backdrop"></div>
  <div class="modal-content" style="border-color: rgba(51, 204, 255, 0.4)">
    <div class="modal-header">
      <div class="modal-subtitle">CORE_SYSTEM_PROTOCOLS</div>
      <button class="modal-close" id="more-close">&times;</button>
    </div>
    <div class="modal-options">
      <!-- Standard Share Protocols -->
      <button class="share-opt" onclick="window.executeEmailDispatch()">
        <div class="opt-icon" style="color: #38bdf8">
          <svg viewBox="0 0 24 24" width="24">
            <path fill="currentColor" d="M2,21L23,12L2,3V10L17,12L2,14V21Z" />
          </svg>
        </div>
        <div class="opt-text">
          <div class="opt-title">SYSTEM_DISPATCH [EMAIL]</div>
          <div class="opt-desc">Direct browser-bound sharing via Gmail</div>
        </div>
      </button>
      <button class="share-opt" onclick="window.executeAssetExtraction()">

            <path fill="currentColor" d="M5,20H19V18H5M19,9H15V3H9V9H5L12,16L19,9Z" />
          </svg>
        </div>
        <div class="opt-text">
          <div class="opt-title">ASSET_EXTRACTION [PDF]</div>
          <div class="opt-desc">Local PDF compilation and direct share</div>
        </div>
      </button>

      <button class="share-opt" onclick="window.copyPortfolioLink()">

            <path
              fill="currentColor"
              d="M19,21H8V7H19M19,5H8A2,2 0 0,0 6,7V21A2,2 0 0,0 8,23H19A2,2 0 0,0 21,21V7A2,2 0 0,0 19,5M16,1H4A2,2 0 0,0 2,3V17H4V3H16V1Z"
