<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Resume Pro - Modular</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Media Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div id="loading-overlay">
        <div class="loader-content">
            <div class="loader-text" id="loader-message">INITIALIZING CORE...</div>
            <div class="loader-bar"><div class="loader-progress" id="loader-progress"></div></div>
        </div>
    </div>

    <!-- UI Controls -->
    <div id="resume-actions" class="hidden-print">
        <button onclick="window.downloadAsPDF()" title="Download PDF" class="action-btn">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M14,2L20,8V20A2,2 0 0,1 18,22H6A2,2 0 0,1 4,20V4A2,2 0 0,1 6,2H14M18,20V9H13V4H6V20H18M12,19L8,15H10.5V12H13.5V15H16L12,19Z"/></svg>
        </button>
        <button onclick="window.print()" title="Print Resume" class="action-btn">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M18,3H6V7H18M19,12A1,1 0 0,1 18,11A1,1 0 0,1 19,10A1,1 0 0,1 20,11A1,1 0 0,1 19,12M16,19H8V14H16M19,8H5A3,3 0 0,0 2,11V17H6V21H18V17H22V11A3,3 0 0,0 19,8Z"/></svg>
        </button>
        <button id="share-toggle" title="Share Logic" class="action-btn" style="color: #00ffcc;">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M18,16.08C17.24,16.08 16.56,16.38 16.04,16.85L8.91,12.7C8.96,12.47 9,12.24 9,12C9,11.76 8.96,11.53 8.91,11.3L15.96,7.19C16.5,7.69 17.21,8 18,8A3,3 0 0,0 21,5A3,3 0 0,0 18,2A3,3 0 0,0 15,5C15,5.24 15.04,5.47 15.09,5.7L8.04,9.81C7.5,9.31 6.79,9 6,9A3,3 0 0,0 3,12A3,3 0 0,0 6,15C6.79,15 7.5,14.69 8.04,14.19L15.16,18.34C15.11,18.55 15.08,18.77 15.08,19C15.08,20.61 16.39,21.91 18,21.91C19.61,21.91 20.92,20.61 20.92,19C20.92,17.39 19.61,16.08 18,16.08Z"/></svg>
        </button>
        <button id="theme-toggle" title="Toggle Interactive Mode" class="action-btn">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20V4Z"/></svg>
        </button>
    </div>

    <div class="resume-container hidden" id="main-resume">
        <header id="header-module"></header>
        <div class="resume-grid">
            <div class="main-col">
                <section id="summary-module"></section>
                <section id="experience-module"></section>
                <section id="projects-module"></section>
            </div>
            <div class="side-col">
                <section id="skills-module"></section>
                <section id="education-module"></section>
                <footer id="footer-module"></footer>
            </div>
        </div>
    </div>

    <!-- Share Modal -->
    <div id="share-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-subtitle">SELECT_DISPATCH_PROTOCOL</div>
                <button class="modal-close" id="share-close">&times;</button>
            </div>
            <div class="modal-options">
                <button class="share-opt" onclick="window.executeEmailDispatch()">
                    <div class="opt-icon" style="color: #38bdf8;"><svg viewBox="0 0 24 24" width="24"><path fill="currentColor" d="M2,21L23,12L2,3V10L17,12L2,14V21Z"/></svg></div>
                    <div class="opt-text">
                        <div class="opt-title">SYSTEM_DISPATCH [EMAIL]</div>
                        <div class="opt-desc">Direct browser-bound sharing via Gmail</div>
                    </div>
                </button>
                <button class="share-opt" onclick="window.executeAssetExtraction()">
                    <div class="opt-icon" style="color: #00ffcc;"><svg viewBox="0 0 24 24" width="24"><path fill="currentColor" d="M5,20H19V18H5M19,9H15V3H9V9H5L12,16L19,9Z"/></svg></div>
                    <div class="opt-text">
                        <div class="opt-title">ASSET_EXTRACTION [PDF]</div>
                        <div class="opt-desc">Local PDF compilation and direct share</div>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <!-- Dispatch Overlay -->
    <div id="dispatch-overlay" class="dispatch-screen hidden">
        <div class="dispatch-loader">
            <div class="scan-line"></div>
            <div class="dispatch-icon"><svg viewBox="0 0 24 24" width="48"><path fill="#38bdf8" d="M12,1L3,5V11C3,16.55 6.84,21.74 12,23C17.16,21.74 21,16.55 21,11V5L12,1M12,7L18,11V15H12V7Z"/></svg></div>
            <div class="dispatch-title">DISPATCHING_ASSET</div>
            <div class="dispatch-status">SECURE_CHANNEL_ESTABLISHED</div>
        </div>
    </div>

    <!-- Main Engine -->
    <script src="js/script.js"></script>
</body>
</html>
