    <!-- Structured Data (Schema.org) -->
    <script type="application/ld+json">

      "@context": "https://schema.org",

      "name": "A. Mohamed Yasar",

    <style>
      /* Initial Splash Loader to prevent white-flash */
      body { background: #010409; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; overflow: hidden; }
      #initial-loader {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: radial-gradient(circle at center, #0d1117 0%, #010409 100%);
        z-index: 9999; transition: opacity 0.5s ease-out;
      }
      .loader-content { display: flex; align-items: baseline; gap: 8px; }
      .brand-text {
        font-family: 'Syncopate', sans-serif; font-weight: 900; font-size: 2.5rem;
        background: linear-gradient(270deg, #ff3366, #ff9933);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        animation: pulse 2s infinite ease-in-out;
      }
      .dot { width: 12px; height: 12px; border-radius: 50%; background: #33ccff; box-shadow: 0 0 20px #33ccff; }
      @keyframes pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; filter: drop-shadow(0 0 10px rgba(255, 51, 102, 0.5)); } }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <div class="loader-content">
        <span class="brand-text">MY</span>
        <div class="dot"></div>
      </div>
    </div>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
