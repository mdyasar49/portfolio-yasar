<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="theme-color" content="#030712" />
    <meta name="referrer" content="no-referrer-when-downgrade" />

    <!-- Performance & Branding -->
    <link rel="stylesheet" href="/css/branding.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://mern-portfolio-yasar-1.onrender.com/" />
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Syncopate:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="preload" href="/logo.png" as="image" />

    <!-- SEO Meta Tags -->
    <title>Mohamed Yasar | Elite MERN Stack Engineer & UI Architect</title>
    <meta name="title" content="Mohamed Yasar | Elite MERN Stack Engineer & UI Architect" />
    <meta name="description" content="Professional Engineering Portfolio of A. Mohamed Yasar. Specialized in high-performance MERN stack applications, cutting-edge UI/UX design, and scalable cloud architecture." />
    <meta name="keywords" content="A. Mohamed Yasar, Mohamed Yasar Portfolio, MERN Stack Developer, Full Stack Engineer, React Developer, Node.js Expert, UI/UX Designer, Web Performance, Cloud Architect" />
    <meta name="author" content="A. Mohamed Yasar" />
    <meta name="robots" content="index, follow" />

    <!-- PWA & Favicon Branding -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="canonical" href="https://mern-portfolio-yasar-1.onrender.com/" />

    <!-- Social Meta Tags (LinkedIn-Style Perfection) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mern-portfolio-yasar-1.onrender.com/" />
    <meta property="og:title" content="A. Mohamed Yasar Portfolio" />
    <meta property="og:site_name" content="Mohamed Yasar · Portfolio" />
    <meta property="og:description" content="Elite MERN Stack Engineer & UI Architect. Explore high-performance web systems and production-grade architectures." />
    <meta property="og:image" content="https://mern-portfolio-yasar-1.onrender.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="apple-mobile-web-app-title" content="Mohamed Yasar" />
    <meta name="application-name" content="Mohamed Yasar" />
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:image" content="https://mern-portfolio-yasar-1.onrender.com/og-image.png" />

    <!-- Structured Data Integration -->
    <script type="application/ld+json" id="schema-data"></script>
    <script>
      // Load Schema Data
      fetch('/data/schema.json')
        .then(r => r.json())
        .then(data => document.getElementById('schema-data').textContent = JSON.stringify(data));
    </script>
  </head>
  <body>
    <!-- Instant Component Loader -->
    <div id="loader-injection-point"></div>
    <script>
      (function() {
        fetch('/components/splash-loader.html')
          .then(r => r.text())
          .then(html => document.getElementById('loader-injection-point').innerHTML = html);
      })();
    </script>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- Brand Initialization -->
    <script src="/js/brand-init.js"></script>
  </body>
</html>
