<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Resume Template</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/resume-design.css">
</head>
<body>
    <div id="loading" class="text-center py-20 text-indigo-500 font-bold uppercase tracking-widest text-xs">Architecting Luxury Resume...</div>
    
    <div class="resume-page hidden" id="resumeContent">
        <aside class="sidebar">
            <div class="contact-box">
                <div class="sidebar-title">Contact Information</div>
                <div class="contact-item">EMAIL <b>mohamedyasar081786@gmail.com</b></div>
                <div class="contact-item">PHONE <b>+91-9025943184</b></div>
                <div class="contact-item">CITIZENSHIP <b>Indian</b></div>
                <div class="contact-item">LOCATION <b>Chennai, Tamil Nadu</b></div>
            </div>

            <div class="skill-section">
                <div class="sidebar-title">Core Expertise</div>
                
                <div class="skill-group">
                    <div class="skill-group-label">Frontend Architecture</div>
                    <div id="skills-front"></div>
                </div>

                <div class="skill-group">
                    <div class="skill-group-label">Backend Systems</div>
                    <div id="skills-back"></div>
                </div>

                <div class="skill-group">
                    <div class="skill-group-label">Data Orchestration</div>
                    <div id="skills-db"></div>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">Communications</div>
                <div id="languages-list" class="text-xs font-bold space-y-3"></div>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-title">Join Status</div>
                <div id="availability-info" class="text-sm font-black text-indigo-400"></div>
            </div>
        </aside>

        <main class="main">
            <header class="luxury-header">
                <h1 id="user-name"></h1>
                <div class="title-badge" id="user-title"></div>
                <p class="luxury-summary" id="user-summary"></p>
            </header>

            <section>
                <div class="section-label">Professional Chronology</div>
                <div id="experience-list"></div>
            </section>

            <section>
                <div class="section-label">Academic Pedigree</div>
                <div class="edu-box" id="education-list"></div>
            </section>
        </main>
    </div>

    <script src="/resume-design.js"></script>
</body>
</html>
